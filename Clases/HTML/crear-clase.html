<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Crear Nueva Clase | QByte Admin</title>
    <link rel="stylesheet" href="../CSS/crear-clase.css">
</head>
<body>

<header>
    <h1>CREAR NUEVA CLASE</h1>
    <p>Configura el espacio de aprendizaje para tus estudiantes</p>
</header>

<main>
    <form action="../../docente/html/docente.html" method="get">
        <section class="card-config">
            <div class="header-card">
                <h2>📝 Información de la clase</h2>
                <span class="badge-naranja">Nuevo</span>
            </div>
            <div class="input-group">
                <label>Nombre de la Clase:</label>
                <input type="text" placeholder="Ej: Teoría Musical I - Nivel Básico" required>
            </div>
            <div class="input-group">
                <label>Descripción / Introducción:</label>
                <textarea rows="3" placeholder="Describe brevemente qué aprenderán los estudiantes en este módulo..."></textarea>
            </div>
        </section>
        <section class="acciones-finales">
        <button type="submit" class="btn-confirmar">
            CREAR Y PUBLICAR CLASE
        </button>
    </form>
</section>

        <div class="volver-link">
            <a href="../../docente/html/docente.html">⬅ Cancelar y volver al panel principal</a>
        </div>
    </form>
</main>

<footer>
    <p>QByte Platform | Servicio Nacional de Aprendizaje (SENA)</p>
</footer>

</body>
</html>
