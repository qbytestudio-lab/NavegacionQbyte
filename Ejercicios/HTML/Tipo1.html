<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ejercicio Musical</title>
    <link rel="stylesheet" href="../../Ejercicios/CSS/Eleccion.css">
</head>
<body>

<header>
    <h1>Ejercicio de Música</h1>
    <p>Selecciona las respuestas correctas</p>
</header>

<main>

    <section class="pregunta">
        <h2> Pregunta</h2>
        <p>
            Observa la siguiente armadura de clave y selecciona las notas que pertenecen a ella:
        </p>

        <div class="armadura">
            <p>Armadura: 2 sostenidos (Fa# - Do#)</p>
        </div>
    </section>

    <section class="opciones">
        <h3> Opciones</h3>

        <label>
            <input type="checkbox"> Do
        </label>

        <label>
            <input type="checkbox"> Re
        </label>

        <label>
            <input type="checkbox"> Fa#
        </label>

        <label>
            <input type="checkbox"> Sol
        </label>

        <label>
            <input type="checkbox"> Do#
        </label>

    </section>

 <section class="acciones">
    <form action="../../Clases/HTML/Refuerzo-estu.html" method="get">
        <button type="submit" class="btn-enviar">Enviar respuesta</button>
    </form>
</section>

    <section class="volver">
        <a href="../../Clases/HTML/Refuerzo-estu.html">⬅ Volver a clase</a>
    </section>

</main>

<footer>
    <p>Plataforma de aprendizaje musical</p>
</footer>

</body>
</html>
