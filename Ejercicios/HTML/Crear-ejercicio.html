<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Crear Nuevo Ejercicio | QByte</title>
    <link rel="stylesheet" href="../CSS/Crear.css">
</head>
<body>

<header>
    <h1>CREAR NUEVO EJERCICIO</h1>
    <p>Diseña el contenido para tus estudiantes</p>
</header>

<main>
    <section class="card-pregunta">
        <div class="card-header">
            <h2>🎼 Configuración de Pregunta</h2>
        </div>
        <div class="input-box">
            <label>Instrucción del ejercicio:</label>
            <input type="text" placeholder="Ej: Observa las notas y selecciona la correcta...">
        </div>
        <div class="input-highlight">
            <label>Contenido / Pista visual (Texto):</label>
            <textarea rows="2" placeholder="Ej: Armadura: 2 sostenidos (Fa# - Do#)"></textarea>
        </div>
    </section>

    <section class="card-opciones">
        <div class="card-header">
            <h3>🎵 Definir Opciones</h3>
        </div>
        <p class="ayuda">Escribe las opciones y marca la(s) que sea(n) correcta(s):</p>
        
        <form id="form-crear">
            <div class="option-item-create">
                <input type="checkbox" title="Marcar como correcta"> 
                <input type="text" placeholder="Opción 1">
            </div>
            <div class="option-item-create">
                <input type="checkbox" title="Marcar como correcta"> 
                <input type="text" placeholder="Opción 2">
            </div>
            <div class="option-item-create">
                <input type="checkbox" title="Marcar como correcta"> 
                <input type="text" placeholder="Opción 3">
            </div>
            <div class="option-item-create">
                <input type="checkbox" title="Marcar como correcta"> 
                <input type="text" placeholder="Opción 4">
            </div>
        </form>
    </section>

    <section class="card-acciones">
        <form action="../../Clases/HTML/Refuerzo-doc.html" method="get">
    
    <section class="card-acciones">
        <button type="submit" class="btn-save">Publicar Ejercicio en la Clase</button>
    </section>
</form>
    </section>

    <section class="card-back">
        <a href="../../Clases/HTML/Refuerzo-doc.html" class="btn-back">⬅ Cancelar y volver al panel</a>
    </section>
</main>

<footer>
    <p>Plataforma de aprendizaje musical | Panel de Gestión Docente</p>
</footer>

</body>
</html>
